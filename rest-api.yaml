basePath: /
consumes:
    - application/json
definitions:
    asyncResponse:
        description: |-
            asyncResponse references a background operation. The operation object is
            carried in metadata; the operation URL is also echoed in the Location header.
        properties:
            metadata:
                x-go-name: Metadata
            operation:
                type: string
                x-go-name: Operation
            status:
                type: string
                x-go-name: Status
            status_code:
                format: int64
                type: integer
                x-go-name: StatusCode
            type:
                type: string
                x-go-name: Type
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    batchManifestRequest:
        description: |-
            batchManifestRequest is the prepared batch manifest accepted by
            POST /1.0/answer/batch. It mirrors chat.BatchManifest but is JSON-tagged and
            decoupled from the YAML on-disk format. The run endpoint accepts only a
            prepared manifest; deriving a manifest from a document is a separate
            operation exposed by POST /1.0/answer/build (see handleAnswerBuild and the
            rest-api-answer spec).
        properties:
            knowledge_bases:
                items:
                    type: string
                type: array
                x-go-name: KnowledgeBases
            model:
                type: string
                x-go-name: Model
            prompt:
                type: string
                x-go-name: Prompt
            prompt_ref:
                description: |-
                    PromptRef names a stored answer_system_prompt variant to run this batch on.
                    It is mutually exclusive with the inline Prompt.
                type: string
                x-go-name: PromptRef
            questions:
                items:
                    $ref: '#/definitions/batchQuestionRequest'
                type: array
                x-go-name: Questions
            temperature:
                format: double
                type: number
                x-go-name: Temperature
            version:
                type: string
                x-go-name: Version
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    batchQuestionRequest:
        properties:
            id:
                type: string
                x-go-name: ID
            keywords:
                items:
                    type: string
                type: array
                x-go-name: Keywords
            question:
                type: string
                x-go-name: Question
        title: batchQuestionRequest is a single question in a posted manifest.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    chatStartRequest:
        description: |-
            chatStartRequest is the body of POST /1.0/chat. All fields are optional: the
            model falls back to config/server lookup, and the active bases and
            temperature default to the chat REPL's behaviour. Resume, when set, seeds the
            session from the saved chat with that id (its transcript and active bases).
        properties:
            bases:
                items:
                    type: string
                type: array
                x-go-name: Bases
            model:
                type: string
                x-go-name: Model
            prompt:
                description: |-
                    Prompt optionally names a variant of chat_system_prompt to run this session
                    on (the slot is implied). It overrides the slot's active pointer for this
                    session only; an unknown variant fails the request. Empty uses the active
                    selection (or the built-in default).
                type: string
                x-go-name: Prompt
            resume:
                type: string
                x-go-name: Resume
            temperature:
                format: double
                type: number
                x-go-name: Temperature
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    createKnowledgeRequest:
        properties:
            default_label:
                type: string
                x-go-name: DefaultLabel
            name:
                type: string
                x-go-name: Name
        title: createKnowledgeRequest is the body of POST /1.0/knowledge.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    errorResponse:
        properties:
            error:
                type: string
                x-go-name: Error
            error_code:
                format: int64
                type: integer
                x-go-name: ErrorCode
            type:
                type: string
                x-go-name: Type
        title: errorResponse is the body of a failed request. error_code mirrors the HTTP status.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    exportRequest:
        properties:
            compress:
                type: boolean
                x-go-name: Compress
            output_dir:
                type: string
                x-go-name: OutputDir
        title: exportRequest is the body of POST /1.0/knowledge/{name}/export.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    gdriveImportRequest:
        description: |-
            gdriveImportRequest is the body of POST /1.0/knowledge/gdrive/import. Each
            call imports one archive; the UI issues one call per selected archive so each
            becomes an independently tracked operation.
        properties:
            force:
                type: boolean
                x-go-name: Force
            id:
                type: string
                x-go-name: ID
            name:
                type: string
                x-go-name: Name
            target:
                type: string
                x-go-name: Target
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    gdriveResolveRequest:
        properties:
            url:
                type: string
                x-go-name: URL
        title: gdriveResolveRequest is the body of POST /1.0/knowledge/gdrive/resolve.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    importRequest:
        properties:
            force:
                type: boolean
                x-go-name: Force
            input_dir:
                type: string
                x-go-name: InputDir
            name:
                type: string
                x-go-name: Name
        title: importRequest is the body of POST /1.0/knowledge:import.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    ingestItem:
        description: |-
            ingestItem describes a single source to ingest. For URL items URL is set; for
            repo items Type is "github"/"gitea" and Source carries the repo reference; for
            uploaded files filePath is the staged path.
        properties:
            branch:
                type: string
                x-go-name: Branch
            extensions:
                items:
                    type: string
                type: array
                x-go-name: Extensions
            label:
                type: string
                x-go-name: Label
            path:
                type: string
                x-go-name: Path
            source:
                type: string
                x-go-name: Source
            source_id:
                type: string
                x-go-name: SourceID
            type:
                type: string
                x-go-name: Type
            url:
                type: string
                x-go-name: URL
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    ingestRequest:
        description: |-
            ingestRequest is the JSON body for URL or batch ingestion of
            POST /1.0/knowledge/{name}/sources. File uploads use multipart instead.
        properties:
            batch:
                items:
                    $ref: '#/definitions/ingestItem'
                type: array
                x-go-name: Batch
            force:
                type: boolean
                x-go-name: Force
            label:
                type: string
                x-go-name: Label
            source_id:
                type: string
                x-go-name: SourceID
            url:
                type: string
                x-go-name: URL
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    searchRequest:
        properties:
            bases:
                items:
                    type: string
                type: array
                x-go-name: Bases
            count:
                format: int64
                type: integer
                x-go-name: Count
            query:
                type: string
                x-go-name: Query
        title: searchRequest is the body of POST /1.0/search.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
    syncResponse:
        properties:
            metadata:
                x-go-name: Metadata
            status:
                type: string
                x-go-name: Status
            status_code:
                format: int64
                type: integer
                x-go-name: StatusCode
            type:
                type: string
                x-go-name: Type
        title: syncResponse is the body of a successful, immediately-completed request.
        type: object
        x-go-package: github.com/jpnorenam/rag-snap/internal/api
info:
    description: |-
        The spec below is consumed by go-swagger to generate rest-api.yaml. Handlers
        this file are referenced by those routes. Keep annotations in sync with the
        routes registered in server.go — `make spec-check` fails the build on drift.

        Package api ragd REST API.

        ragd exposes knowledge management, hybrid search, interactive chat, and batch
        answering over a local unix socket. Every JSON response uses a uniform
        sync/async/error envelope; long-running work is modelled as operations with a
        companion events websocket. Local access is authenticated by socket peer
        credentials (root or a member of the configured group); there is no
        per-route authorization.
    title: implements the ragd local REST API.
    version: "1.0"
paths:
    /:
        get:
            description: |-
                Advertises the supported version(s), the caller's auth state, and the
                api_extensions list. Reachable by an untrusted caller so a client can
                discover whether it has access.
            operationId: apiRoot
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
            summary: Discover the API.
            tags:
                - server
    /1.0:
        get:
            description: |-
                Server metadata plus a read-only, secret-free summary of effective config and
                backend readiness for diagnostics.
            operationId: serverInfo
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
            summary: Return server information.
            tags:
                - server
    /1.0/answer/batch:
        post:
            description: |-
                Runs a prepared batch manifest of questions through the RAG+LLM pipeline as
                an async operation. Progress is reported in the operation metadata across the
                questions, and the structured results are stored on the operation for
                retrieval on completion. To derive a manifest from a document, use the
                separate POST /1.0/answer/build endpoint (Tika extraction + optional LLM
                refinement); this run endpoint accepts only a prepared manifest.
            operationId: answerBatch
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/batchManifestRequest'
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Run a batch of questions.
            tags:
                - answer
    /1.0/answer/build:
        post:
            consumes:
                - multipart/form-data
            description: |-
                Accepts an uploaded RFP/RFI document (PDF, DOCX, XLSX, CSV) as
                multipart/form-data. Free-text formats (PDF, DOCX) extract candidate
                questions in one pass and publish them on the operation metadata under
                "questions". Tabular formats (XLSX, CSV) do not extract on this pass — the
                question column cannot be reliably guessed — so the operation instead parses
                the document into tables and completes with a discriminated response:
                "needs_column": true, an opaque "build_token", the parsed "tables" (headers
                and per-column samples), and a heuristic "suggested" table/column. The client
                then calls POST /1.0/answer/build/extract for the chosen column. When the
                "refine" field is not "false", an LLM refinement pass is applied to the
                extracted questions. This endpoint never persists a manifest or runs a batch.
            operationId: answerBuild
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Extract candidate questions from a document.
            tags:
                - answer
    /1.0/answer/build/extract:
        post:
            description: |-
                Extracts questions from one column of a table parsed and staged by a prior
                POST /1.0/answer/build call, identified by its build token. Does not
                re-upload or re-parse the document. Publishes the questions on the operation
                metadata in the same shape a free-text build does. An unknown/expired token,
                or an out-of-range table/column, is a 400; a column that yields no questions
                after the min-length filter fails the operation with a column-naming message.
            operationId: answerBuildExtract
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Extract questions from a chosen spreadsheet column.
            tags:
                - answer
    /1.0/chat:
        post:
            description: |-
                Starts a chat session as a websocket-class operation. The operation metadata
                carries the websocket connect URL and one-time secret; the client dials it to
                hold the interactive, multi-turn session.
            operationId: chatStart
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/chatStartRequest'
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Start a chat session.
            tags:
                - chat
    /1.0/chats:
        get:
            description: |-
                Returns saved chat summaries newest-first by last-updated time, without the
                full transcript. An optional `search` query parameter filters by
                case-insensitive substring match against title and transcript content.
            operationId: chatsList
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: List saved chats.
            tags:
                - chats
    /1.0/chats/{id}:
        delete:
            description: |-
                Removes the saved chat. A live session resumed from it is unaffected; a later
                save from such a session recreates the record under the same id.
            operationId: chatDelete
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Delete a saved chat.
            tags:
                - chats
        get:
            description: Returns the full saved chat, including its ordered transcript.
            operationId: chatGet
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Return one saved chat.
            tags:
                - chats
    /1.0/config:
        get:
            description: |-
                Returns the effective configuration, sorted by key, each entry naming the layer it
                resolves from ("user" when an override exists, otherwise "package"). Deprecated
                keys are omitted, as they are in the CLI. Secret-shaped values are redacted:
                the key is listed and remains writable, but its value is never returned.
            operationId: configList
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: List the configuration.
            tags:
                - config
    /1.0/config/{key}:
        delete:
            description: |-
                Drops the key's user-layer override so the package value becomes effective again.
                A key with no override cannot be reverted and is rejected.
            operationId: configUnset
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Revert a configuration value to its package default.
            tags:
                - config
        put:
            description: |-
                Writes the value to the user layer, which overrides the package value — the same
                semantics as `rag-cli.rag set <key>=<value>`. A key that does not already exist in
                the merged config is rejected: the API cannot create keys, only override them.
                Deprecated keys are read-only and are rejected too.
            operationId: configSet
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Set a configuration value.
            tags:
                - config
    /1.0/events:
        get:
            description: |-
                Upgrades to a websocket and streams typed events. The type query filters the
                event types (e.g. "operation,logging"). Clients should subscribe before
                launching an operation to avoid a poll race.
            operationId: events
            parameters:
                - description: Comma-separated event types to subscribe to (e.g. "operation,logging").
                  in: query
                  name: type
                  type: string
                  x-go-name: Type
            responses:
                "101":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
            summary: Stream events over a websocket.
            tags:
                - operations
    /1.0/knowledge:
        get:
            operationId: knowledgeList
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: List knowledge bases.
            tags:
                - knowledge
        post:
            operationId: knowledgeCreate
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/createKnowledgeRequest'
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "409":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Create a knowledge base.
            tags:
                - knowledge
    /1.0/knowledge-engine:
        post:
            description: |-
                Sets up models, pipelines, and indexes as an async operation. On success the
                operation metadata reports the resolved model IDs.
            operationId: engineInit
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Initialize the knowledge engine.
            tags:
                - knowledge
    /1.0/knowledge/{name}:
        delete:
            description: |-
                Deletes the base and its source metadata. No interactive confirmation at the
                API layer.
            operationId: knowledgeDelete
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Delete a knowledge base.
            tags:
                - knowledge
        get:
            operationId: knowledgeGet
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Return knowledge base detail.
            tags:
                - knowledge
        patch:
            description: |-
                Stores the default label. With apply_to_existing, unlabeled chunks and
                source records are backfilled as an async operation (explicit per-source
                labels are never overwritten); otherwise the update is synchronous.
            operationId: knowledgePatch
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Set a knowledge base's default label.
            tags:
                - knowledge
    /1.0/knowledge/{name}/export:
        post:
            description: Exports a base as an async operation, reusing the elasticdump-based exporter.
            operationId: knowledgeExport
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/exportRequest'
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Export a knowledge base.
            tags:
                - knowledge
    /1.0/knowledge/{name}/export/{opId}/archive:
        get:
            description: |-
                Streams the compressed archive produced by a finished export operation, so a
                browser can download it without filesystem access to the daemon.

                On success the response body is the raw gzip archive (application/gzip) with a
                Content-Disposition attachment header.
            operationId: knowledgeExportDownload
            responses:
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Download a completed export archive.
            tags:
                - knowledge
    /1.0/knowledge/{name}/sources:
        get:
            operationId: sourcesList
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: List the sources in a knowledge base.
            tags:
                - knowledge
        post:
            consumes:
                - application/json
                - multipart/form-data
            description: |-
                Ingests one or more sources as an async operation. Accepts either a multipart
                file upload or a JSON body describing a URL or a batch of URLs.
            operationId: sourcesIngest
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/ingestRequest'
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Ingest sources into a knowledge base.
            tags:
                - knowledge
    /1.0/knowledge/{name}/sources/{id}:
        delete:
            description: Removes the source's chunks and metadata from the knowledge base.
            operationId: sourceDelete
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
                - description: The source identifier.
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Forget a source.
            tags:
                - knowledge
        get:
            operationId: sourceGet
            parameters:
                - description: The knowledge base name.
                  in: path
                  name: name
                  required: true
                  type: string
                  x-go-name: Name
                - description: The source identifier.
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Return source metadata.
            tags:
                - knowledge
    /1.0/knowledge/gdrive/connect:
        post:
            description: |-
                Starts a loopback OAuth flow in the background and returns the Google consent
                URL for the UI to open in a new tab. Does not block for consent; the UI polls
                status for completion.
            operationId: gdriveConnect
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "412":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Start the Google Drive OAuth flow.
            tags:
                - knowledge
    /1.0/knowledge/gdrive/disconnect:
        post:
            description: Deletes the stored Drive token, disconnecting the account.
            operationId: gdriveDisconnect
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Disconnect Google Drive.
            tags:
                - knowledge
    /1.0/knowledge/gdrive/import:
        post:
            description: |-
                Downloads a single Drive archive and imports it as a tracked async operation.
                The UI issues one call per selected archive so each is tracked independently.
            operationId: gdriveImport
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/gdriveImportRequest'
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "412":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Import a Google Drive archive.
            tags:
                - knowledge
    /1.0/knowledge/gdrive/resolve:
        post:
            description: |-
                Resolves a Drive folder or file URL into the list of discovered .tar.gz
                archives, distinguishing not found, no access, and unrecognised-URL errors.
            operationId: gdriveResolve
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/gdriveResolveRequest'
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "412":
                    $ref: '#/responses/errorResponse'
                "502":
                    $ref: '#/responses/errorResponse'
            summary: Resolve a Google Drive URL into archives.
            tags:
                - knowledge
    /1.0/knowledge/gdrive/status:
        get:
            description: |-
                Reports whether Drive import is configured, whether a valid token is stored,
                whether an OAuth flow is pending, and the connected account when available.
                The token itself is never returned.
            operationId: gdriveStatus
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
            summary: Report Google Drive connection status.
            tags:
                - knowledge
    /1.0/knowledge/import:
        post:
            description: |-
                Imports a base from a previously exported artifact as an async operation. This
                endpoint handles local uploads; Google Drive import has its own endpoints under
                1.0/knowledge/gdrive (see handlers_gdrive.go).
            operationId: knowledgeImport
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/importRequest'
            responses:
                "202":
                    $ref: '#/responses/asyncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Import a knowledge base.
            tags:
                - knowledge
    /1.0/operations:
        get:
            description: Returns a snapshot of all current operations.
            operationId: operationsList
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
            summary: List operations.
            tags:
                - operations
    /1.0/operations/{id}:
        delete:
            description: |-
                Requests cooperative cancellation. Fails if the operation cannot be cancelled
                or is already complete.
            operationId: operationDelete
            parameters:
                - description: The operation UUID.
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Cancel an operation.
            tags:
                - operations
        get:
            operationId: operationGet
            parameters:
                - description: The operation UUID.
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Return an operation.
            tags:
                - operations
    /1.0/operations/{id}/wait:
        get:
            description: |-
                Blocks until the operation is terminal or the timeout (in seconds) elapses,
                then returns the operation. A timeout that elapses returns the current state,
                not an error.
            operationId: operationWait
            parameters:
                - description: The operation UUID.
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
                - description: |-
                    Maximum seconds to block waiting for the operation to reach a terminal
                    state. A timeout that elapses returns the current state, not an error.
                  format: int64
                  in: query
                  name: timeout
                  type: integer
                  x-go-name: Timeout
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Wait for an operation.
            tags:
                - operations
    /1.0/operations/{id}/websocket:
        get:
            description: |-
                Upgrades to the websocket for a websocket-class operation (e.g. a chat
                session) after checking the one-time secret. The interaction runs until the
                connection closes, an idle timeout fires, or the operation is cancelled.
            operationId: chatConnect
            parameters:
                - description: The operation UUID.
                  in: path
                  name: id
                  required: true
                  type: string
                  x-go-name: ID
                - description: The one-time websocket secret from the chat operation metadata.
                  in: query
                  name: secret
                  required: true
                  type: string
                  x-go-name: Secret
            responses:
                "101":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Connect to an operation's websocket.
            tags:
                - operations
    /1.0/prompts:
        get:
            description: |-
                Returns the three RAG prompt slots in the order the CLI presents them, each
                with its effective value, its built-in default, and whether an override is
                active. Generation slots additionally carry the active variant name and the
                list of stored variant names. Chat sessions and batch runs started by the
                daemon are seeded from these values.
            operationId: promptsList
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
            summary: List the prompt slots.
            tags:
                - prompts
    /1.0/prompts/{name}:
        delete:
            description: |-
                Returns the slot to the built-in default of the running release: a generation
                slot's active pointer is cleared (stored variants preserved); the source_rules
                override is cleared. Resetting an uncustomized slot succeeds as a no-op.
            operationId: promptReset
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Reset a prompt slot to its default.
            tags:
                - prompts
        get:
            operationId: promptGet
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Return one prompt slot.
            tags:
                - prompts
        put:
            description: |-
                Writes the value through the slot's current selection: a new version on the
                active variant, or — when the built-in default is active on a generation slot
                — a `custom` variant that is created and activated. An empty value is rejected
                — reset a slot to its default with DELETE. A value equal to the built-in
                default clears the legacy `custom` variant (or the source_rules override)
                rather than storing a copy.
            operationId: promptUpdate
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Customize a prompt slot.
            tags:
                - prompts
    /1.0/prompts/{slot}:
        patch:
            description: |-
                Points the slot's active pointer at a stored variant, or at the built-in
                default when the value is empty. Activating an unknown variant is a not-found.
            operationId: slotActivate
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Activate a variant on a slot.
            tags:
                - prompts
    /1.0/prompts/{slot}/variants:
        get:
            operationId: variantsList
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: List a generation slot's variants.
            tags:
                - prompts
        post:
            description: |-
                Stores a new variant from an initial value. The name must match
                `^[a-z0-9][a-z0-9-]{0,63}$` and must not be the reserved name `default`. A
                name already in use is a conflict. The variant is not activated.
            operationId: variantCreate
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "409":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Create a variant.
            tags:
                - prompts
    /1.0/prompts/{slot}/variants/{name}:
        delete:
            description: |-
                Removes the variant and its history. The active variant cannot be deleted —
                activate another selection first.
            operationId: variantDelete
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "409":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Delete a variant.
            tags:
                - prompts
        get:
            operationId: variantGet
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: Return one variant's head value.
            tags:
                - prompts
        put:
            description: |-
                Appends a new version, creating the variant if absent. A value byte-identical
                to the head is a no-op. An empty value is rejected.
            operationId: variantUpdate
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Save a new version of a variant.
            tags:
                - prompts
    /1.0/prompts/{slot}/variants/{name}/restore:
        post:
            description: |-
                Appends a new head version carrying the named version's content. Restoring the
                current head is a no-op; an unknown version is a not-found.
            operationId: variantRestore
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Restore an earlier version.
            tags:
                - prompts
    /1.0/prompts/{slot}/variants/{name}/versions:
        get:
            operationId: variantVersions
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "404":
                    $ref: '#/responses/errorResponse'
            summary: List a variant's version history.
            tags:
                - prompts
    /1.0/search:
        post:
            description: |-
                Runs hybrid (neural + lexical) retrieval over the named bases. Requires a
                configured embedding model.
            operationId: search
            parameters:
                - in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/searchRequest'
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "400":
                    $ref: '#/responses/errorResponse'
                "403":
                    $ref: '#/responses/errorResponse'
                "500":
                    $ref: '#/responses/errorResponse'
            summary: Hybrid search over knowledge bases.
            tags:
                - search
    /1.0/status:
        get:
            description: |-
                Probes each external service (OpenSearch, the inference server, Tika) over HTTP at
                request time and reports the daemon's own listeners. Services degrade
                independently: an unreachable service is reported as such and never fails the
                request. The OpenSearch entry lists the ML models OpenSearch currently has
                deployed, alongside the configured model IDs, so a configured model that is not
                deployed is visible before a search fails on it.
            operationId: statusGet
            responses:
                "200":
                    $ref: '#/responses/syncResponse'
                "403":
                    $ref: '#/responses/errorResponse'
            summary: Report service health and models.
            tags:
                - status
produces:
    - application/json
responses:
    asyncResponse:
        description: A reference to a background operation accepted for asynchronous processing.
        headers:
            Location:
                description: The canonical operation URL (also echoed in the body).
                type: string
        schema:
            $ref: '#/definitions/asyncResponse'
    errorResponse:
        description: An error response. error_code mirrors the HTTP status.
        schema:
            $ref: '#/definitions/errorResponse'
    syncResponse:
        description: A successful, immediately-completed response.
        schema:
            $ref: '#/definitions/syncResponse'
schemes:
    - http
swagger: "2.0"
