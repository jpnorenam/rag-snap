name: Build and publish snap

# Triggers:
#   - push to main        → build + publish to "edge" channel
#   - GitHub release      → build + publish to "stable" channel
#   - manual dispatch     → build only (useful to test the workflow or get an artifact)
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build and publish run in the same job so the publish steps can reuse
  # steps.build.outputs.snap directly. A prior split-job version downloaded
  # the artifact into a fresh job and passed action-publish a "*.snap" glob;
  # action-publish invokes snapcraft without a shell, so the glob was never
  # expanded and every publish failed with "'*.snap' is not a valid file".
  #
  # Requires the SNAP_STORE_CREDENTIALS secret. A snap store maintainer can
  # generate it with:
  #   snapcraft export-login --snaps rag-cli --acls package_upload snap-store-token.txt
  # then add the file contents as a repository secret named SNAP_STORE_CREDENTIALS.
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: rag-cli-snap
          path: ${{ steps.build.outputs.snap }}
          retention-days: 7

      - name: Publish to Snap Store edge channel
        if: github.event_name == 'push'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: >-
            ${{ secrets.SNAP_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge

      - name: Publish to Snap Store stable channel
        if: github.event_name == 'release'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: >-
            ${{ secrets.SNAP_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
