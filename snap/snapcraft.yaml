name: rag-cli
base: core26

version: &snap-version "0.0.6"
summary: RAG CLI application
description: |
  This snap configures OpenSearch snap models, pipelines, and indexes
  for a RAG implementation connected to the Inference snap or third-party inference services.

grade: devel
# confinement: devmode
confinement: strict

platforms:
  amd64:

system-usernames:
  snap_daemon: shared

assumes:
  - snapd2.68 # for components support

plugs:
  shmem-perf-analyzer:
    interface: shared-memory
    private: true
  # sys-fs-cgroup-service:
  #   interface: system-files
  #   read:
  #     - /sys/fs/cgroup/system.slice/snap.rag-tika.daemon.service

compression: lzo

environment:
  # Workaround until it gets set by snapd
  SNAP_COMPONENTS: /snap/$SNAP_INSTANCE_NAME/components/$SNAP_REVISION
  SNAP_CURRENT: /snap/$SNAP_INSTANCE_NAME/current
  SNAP_DATA_CURRENT: /var/snap/$SNAP_INSTANCE_NAME/current
  JAVA_HOME: ${SNAP}/usr/lib/jvm/java-21-openjdk-amd64
  PATH: ${JAVA_HOME}/jre/bin:$PATH
  HOME: ${SNAP_COMMON}/home/snap_daemon

parts:
  app-scripts:
    source: apps
    plugin: dump
    organize:
      "*": bin/

  system-utilities:
    plugin: nil
    stage-packages:
      - pciutils
      - util-linux

  go-cli:
    plugin: go
    build-snaps:
      - go/1.24/stable
      - node/20/stable
    source: .
    source-type: local
    override-build: |
      # Build the browser UI (Next.js static export) and copy it into the
      # go:embed directory BEFORE the Go build, so ragd embeds the real SPA
      # rather than the committed placeholder. The project already vendors a
      # Node tarball for elasticdump, so a Node toolchain in the build is
      # precedented; here we use the node build-snap for the static export.
      (
        cd ui
        npm ci
        npm run build
      )
      rm -rf internal/webui/dist
      mkdir -p internal/webui/dist
      cp -r ui/out/. internal/webui/dist/

      CGO_ENABLED=0 go build -trimpath \
        -ldflags="-w -s" \
        -o "${CRAFT_PART_INSTALL}/bin/cli" ./cmd/cli
      # ragd is the REST API daemon (opt-in service, see the `ragd` app below).
      # It embeds the UI built above and serves it on the loopback listener.
      CGO_ENABLED=0 go build -trimpath \
        -ldflags="-w -s" \
        -o "${CRAFT_PART_INSTALL}/bin/ragd" ./cmd/ragd

  common-runtime-dependencies:
    plugin: nil
    stage-packages:
      - wget
      - jq
    stage-snaps:
      - yq

  elasticdump:
    plugin: nil
    build-packages:
      - curl
      - xz-utils
    override-build: |
      # The Ubuntu nodejs package splits its built-in JS modules into separate
      # .deb packages that are inaccessible inside snap strict confinement.
      # Use the self-contained official Node.js tarball instead.
      NODE_VERSION="20.19.0"
      mkdir -p "${CRAFT_PART_INSTALL}/usr"
      curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
        | tar -xJ --strip-components=1 -C "${CRAFT_PART_INSTALL}/usr"
      # npm's shebang is `#!/usr/bin/env node`, so `node` must be on PATH.
      export PATH="${CRAFT_PART_INSTALL}/usr/bin:${PATH}"
      npm install -g elasticdump@6.124.2 --prefix "${CRAFT_PART_INSTALL}/usr"

  tika:
    plugin: nil
    build-packages:
      - ca-certificates
      - ca-certificates-java
      - ssl-cert
      - openssl
      - openjdk-21-jre-headless
      - gnupg2
      - wget
    stage-packages:
      - openjdk-21-jdk-headless
    override-build: |
      apt-get update; apt-get upgrade -y; apt-get autoremove --purge -y; apt-get clean -y
      update-ca-certificates -f

      # setup trust store
      trust_store="${CRAFT_PART_INSTALL}/etc/ssl/certs/java/"
      mkdir -p "${trust_store}"
      cp /etc/ssl/certs/java/cacerts "${trust_store}"

      # download tika-server
      TIKA_VERSION="3.1.0"

      NEAREST_URL="https://dlcdn.apache.org/tika/${TIKA_VERSION}/tika-server-standard-${TIKA_VERSION}.jar"
      ARCHIVE_URL="https://archive.apache.org/dist/tika/${TIKA_VERSION}/tika-server-standard-${TIKA_VERSION}.jar"
      BACKUP_URL="https://downloads.apache.org/tika/${TIKA_VERSION}/tika-server-standard-${TIKA_VERSION}.jar"
      DEFAULT_ASC_URL="https://downloads.apache.org/tika/${TIKA_VERSION}/tika-server-standard-${TIKA_VERSION}.jar.asc"
      ARCHIVE_ASC_URL="https://archive.apache.org/dist/tika/${TIKA_VERSION}/tika-server-standard-${TIKA_VERSION}.jar.asc"

      tika_jar="tika-server-standard-${TIKA_VERSION}.jar"

      # import Apache Tika GPG keys
      wget -t 10 --max-redirect 1 --retry-connrefused -qO- https://downloads.apache.org/tika/KEYS | gpg --import

      # download JAR with fallback mirrors
      wget -t 10 --max-redirect 1 --retry-connrefused "${NEAREST_URL}" -O "${tika_jar}" \
        || rm -f "${tika_jar}"
      [ -f "${tika_jar}" ] || wget "${ARCHIVE_URL}" -O "${tika_jar}" \
        || rm -f "${tika_jar}"
      [ -f "${tika_jar}" ] || wget "${BACKUP_URL}" -O "${tika_jar}" \
        || rm -f "${tika_jar}"
      [ -f "${tika_jar}" ] || exit 1

      # download and verify signature
      wget -t 10 --max-redirect 1 --retry-connrefused "${DEFAULT_ASC_URL}" -O "${tika_jar}.asc" \
        || rm -f "${tika_jar}.asc"
      [ -f "${tika_jar}.asc" ] || wget "${ARCHIVE_ASC_URL}" -O "${tika_jar}.asc" \
        || rm -f "${tika_jar}.asc"
      [ -f "${tika_jar}.asc" ] || exit 1
      gpg --verify "${tika_jar}.asc" "${tika_jar}"

      # install tika server
      tika_dir="${CRAFT_PART_INSTALL}/opt/tika"
      mkdir -p "${tika_dir}"
      cp "${tika_jar}" "${tika_dir}/tika-server.jar"

      # clean up
      rm -f "${tika_jar}" "${tika_jar}.asc"

apps:
  rag:
    command: bin/cli
    completer: bin/completion.bash
    plugs:
      # To access server over network socket
      - network
      - home
      - network-bind
      - desktop

  tika-server:
    daemon: simple
    install-mode: disable
    command: bin/tika-start.sh
    restart-condition: always
    restart-delay: 20s
    plugs:
      - network
      - network-bind
      - hardware-observe
      - log-observe
      - mount-observe
      - process-control
      - shmem-perf-analyzer
      - system-observe
      # - sys-fs-cgroup-service
      - intel-qat
    environment:
      JAVA_OPTS: "-Xms512m -Xmx2g -XX:-UseContainerSupport"
      LD_LIBRARY_PATH: "${LD_LIBRARY_PATH}:${KNN_LIB_DIR}"

  ragd:
    # REST API daemon. Opt-in like tika-server: present but disabled on install,
    # started explicitly with `snap start rag-cli.ragd`. Runs as root. The daemon
    # creates the unix socket itself and chmods it world-connectable (0666); it
    # does NOT chown it to api.socket.group, because the strict-confinement seccomp
    # profile denies chowning to an arbitrary group (it would crash the daemon —
    # see design Decision 1). Access is gated solely by the SO_PEERCRED check,
    # which admits root and members of api.socket.group.
    daemon: simple
    install-mode: disable
    command: bin/ragd
    restart-condition: always
    restart-delay: 5s
    plugs:
      # Reach the OpenSearch, inference, and Tika backends over the network.
      - network
      # network-bind also lets the opt-in loopback listener bind its port when
      # api.loopback.enabled=true. The bind is loopback-only: the daemon refuses
      # any non-loopback address (enforced in internal/api/loopback.go).
      - network-bind
    # Backend secrets (OPENSEARCH_USERNAME, OPENSEARCH_PASSWORD, CHAT_API_KEY) live on the
    # daemon service environment only, never in config and never on the `rag` CLI app
    # (task 8.2). API clients talk to the daemon over the unix socket and never receive
    # these values.
    #
    # IMPORTANT: this app deliberately declares no `environment:` stanza. Any key hardcoded
    # here would be applied by `snap run` *after* systemd and therefore OVERRIDE any systemd
    # drop-in / EnvironmentFile for that key — the empty/baked-in value would silently
    # clobber whatever the operator supplied at runtime. None of these secrets has a usable
    # baked-in default (including OPENSEARCH_USERNAME/PASSWORD — a hardcoded admin/admin
    # would prevent ever pointing at a cluster with different credentials), so all three are
    # operator-injected on the service environment the same way, e.g.
    #   sudo mkdir -p /etc/systemd/system/snap.rag-cli.ragd.service.d
    #   printf '[Service]\nEnvironment=CHAT_API_KEY=%s\nEnvironment=OPENSEARCH_USERNAME=%s\nEnvironment=OPENSEARCH_PASSWORD=%s\n' \
    #     "$CHAT_KEY" "$OS_USER" "$OS_PASS" | \
    #     sudo tee /etc/systemd/system/snap.rag-cli.ragd.service.d/10-secrets.conf
    #   sudo chmod 600 .../10-secrets.conf && sudo systemctl daemon-reload
    #   sudo snap restart rag-cli.ragd
